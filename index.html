<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .calculator-btn {
            transition: all 0.2s;
        }
        .calculator-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-sm bg-white rounded-3xl shadow-xl p-6 border border-slate-100">
        <!-- Display -->
        <div class="mb-6">
            <div id="prev-operand" class="text-slate-400 text-sm h-6 text-right truncate"></div>
            <div id="current-operand" class="text-slate-800 text-4xl font-light text-right h-12 truncate">0</div>
        </div>

        <!-- Buttons Grid -->
        <div class="grid grid-cols-4 gap-3">
            <button onclick="clearDisplay()" class="calculator-btn bg-rose-50 text-rose-500 p-4 rounded-2xl font-semibold">AC</button>
            <button onclick="appendOperator('/')" class="calculator-btn bg-slate-100 text-slate-600 p-4 rounded-2xl font-semibold">÷</button>
            <button onclick="appendOperator('*')" class="calculator-btn bg-slate-100 text-slate-600 p-4 rounded-2xl font-semibold">×</button>
            <button onclick="deleteLast()" class="calculator-btn bg-slate-100 text-slate-600 p-4 rounded-2xl font-semibold">DEL</button>
            
            <button onclick="appendNumber('7')" class="calculator-btn bg-slate-50 text-slate-700 p-4 rounded-2xl font-medium">7</button>
            <button onclick="appendNumber('8')" class="calculator-btn bg-slate-50 text-slate-700 p-4 rounded-2xl font-medium">8</button>
            <button onclick="appendNumber('9')" class="calculator-btn bg-slate-50 text-slate-700 p-4 rounded-2xl font-medium">9</button>
            <button onclick="appendOperator('-')" class="calculator-btn bg-slate-100 text-slate-600 p-4 rounded-2xl font-semibold">-</button>
            
            <button onclick="appendNumber('4')" class="calculator-btn bg-slate-50 text-slate-700 p-4 rounded-2xl font-medium">4</button>
            <button onclick="appendNumber('5')" class="calculator-btn bg-slate-50 text-slate-700 p-4 rounded-2xl font-medium">5</button>
            <button onclick="appendNumber('6')" class="calculator-btn bg-slate-50 text-slate-700 p-4 rounded-2xl font-medium">6</button>
            <button onclick="appendOperator('+')" class="calculator-btn bg-slate-100 text-slate-600 p-4 rounded-2xl font-semibold">+</button>
            
            <button onclick="appendNumber('1')" class="calculator-btn bg-slate-50 text-slate-700 p-4 rounded-2xl font-medium">1</button>
            <button onclick="appendNumber('2')" class="calculator-btn bg-slate-50 text-slate-700 p-4 rounded-2xl font-medium">2</button>
            <button onclick="appendNumber('3')" class="calculator-btn bg-slate-50 text-slate-700 p-4 rounded-2xl font-medium">3</button>
            <button onclick="calculate()" class="calculator-btn bg-indigo-600 text-white p-4 rounded-2xl row-span-2 font-bold">=</button>
            
            <button onclick="appendNumber('0')" class="calculator-btn bg-slate-50 text-slate-700 p-4 rounded-2xl font-medium col-span-2">0</button>
            <button onclick="appendNumber('.')" class="calculator-btn bg-slate-50 text-slate-700 p-4 rounded-2xl font-medium">.</button>
        </div>
    </div>

    <script>
        let currentInput = '0';
        let previousInput = '';
        let operator = null;

        const currentDisplay = document.getElementById('current-operand');
        const prevDisplay = document.getElementById('prev-operand');

        function updateDisplay() {
            currentDisplay.innerText = currentInput;
            prevDisplay.innerText = previousInput + (operator ? ' ' + operator : '');
        }

        function appendNumber(number) {
            if (number === '.' && currentInput.includes('.')) return;
            if (currentInput === '0' && number !== '.') {
                currentInput = number;
            } else {
                currentInput += number;
            }
            updateDisplay();
        }

        function appendOperator(op) {
            if (operator !== null) calculate();
            previousInput = currentInput;
            currentInput = '0';
            operator = op;
            updateDisplay();
        }

        function clearDisplay() {
            currentInput = '0';
            previousInput = '';
            operator = null;
            updateDisplay();
        }

        function deleteLast() {
            if (currentInput.length > 1) {
                currentInput = currentInput.slice(0, -1);
            } else {
                currentInput = '0';
            }
            updateDisplay();
        }

        function calculate() {
            let result;
            const prev = parseFloat(previousInput);
            const current = parseFloat(currentInput);
            if (isNaN(prev) || isNaN(current)) return;

            switch (operator) {
                case '+': result = prev + current; break;
                case '-': result = prev - current; break;
                case '*': result = prev * current; break;
                case '/': result = current !== 0 ? prev / current : 'Error'; break;
                default: return;
            }

            currentInput = result.toString();
            operator = null;
            previousInput = '';
            updateDisplay();
        }
    </script>
</body>
</html>
