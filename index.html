<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Calculator</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f2f5;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .calculator {
            background-color: #ffffff;
            padding: 24px;
            border-radius: 32px; /* Smoother corner radius */
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            width: 320px;
        }

        .display {
            text-align: right;
            font-size: 3.5rem;
            color: #202124;
            padding: 20px 10px 40px 10px;
            font-weight: 200;
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            background-color: #f8f9fa;
            border: none;
            border-radius: 20px; /* Squircle style */
            padding: 24px 0;
            font-size: 1.25rem;
            color: #3c4043;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:active {
            background-color: #e8eaed;
        }

        .btn-ac { color: #d93025; }
        .btn-operator { color: #1967d2; }

        .btn-equals {
            grid-row: span 2;
            background-color: #4285f4;
            color: white;
            border-radius: 20px;
        }

        .btn-zero { grid-column: span 2; }
    </style>
</head>
<body>

<div class="calculator">
    <div class="display">0</div>
    <div class="keypad">
        <button class="btn-ac">AC</button>
        <button class="btn-operator">÷</button>
        <button class="btn-operator">×</button>
        <button class="btn-operator">DEL</button>
        <button>7</button><button>8</button><button>9</button><button class="btn-operator">-</button>
        <button>4</button><button>5</button><button>6</button><button class="btn-operator">+</button>
        <button>1</button><button>2</button><button>3</button>
        <button class="btn-equals">=</button>
        <button class="btn-zero">0</button><button>.</button>
    </div>
</div>

</body>
</html>
